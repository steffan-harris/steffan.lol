server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets (Vite content-hashes the filenames): cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Un-hashed static files from public/: cache for a day
    location ~* \.(png|svg|ico|webp|pdf|webmanifest|txt)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA entry point: always revalidate so new deploys are picked up
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
