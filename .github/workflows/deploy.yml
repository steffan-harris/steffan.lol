# Deploys steffan.lol to a Hetzner server via Docker + Caddy.
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   SSH_HOST          Hetzner server IP or hostname
#   SSH_USER          SSH user with docker access on the server
#   SSH_PRIVATE_KEY   Private key for a deploy-only SSH keypair
#   DEPLOY_PATH       Absolute path to the docker-compose stack on the server
#                      (the directory containing the merged docker-compose.yml)
#
# GHCR auth uses the built-in GITHUB_TOKEN — no extra secret needed, but the
# server must `docker login ghcr.io` once with a PAT that has read:packages,
# or the package must be made public.

name: Deploy to Hetzner

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/steffan.lol

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull steffan-lol
            docker compose up -d steffan-lol
            docker image prune -f --filter "until=168h"
