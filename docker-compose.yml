# Run this as its own stack on the Hetzner server (e.g. docker compose -p steffan-lol up -d).
#
# The caddy-net network and Caddy's routing rules are owned by the server-config
# repo, which should be deployed first — see that repo for setup and adding
# this site's block to the Caddyfile.

services:
  steffan-lol:
    image: ghcr.io/steffan-harris/steffan.lol:latest
    restart: unless-stopped
    networks:
      - caddy-net

networks:
  caddy-net:
    external: true
